version: 1
project:
  title: MATILDA.FT Documentation
  exports:
    - format: pdf
      output: exports/matilda.ft-docs.pdf
  authors:
    - name: Robert RiggleGrouch
  github: executablebooks/jupyter-book
  bibliography:
    - references.bib
  math:
    '\mb': '\mathbf{#1}'
    '\R': '\mathbb{R}'
    '\vec': '\mathbf{#1}'
    '\dd': '\mathrm{d}'
    '\kT': 'k_\mathrm{B}T'
  toc:
    - file: intro.md
    - file: overview.md
    - file: ps/particles.ipynb
      children:
        - file: ps/potentials.ipynb
        - file: ps/psKeywords.md
        - file: ps/psMolecules.md
    - file: fts/fts.ipynb
      children:
        - file: fts/integration.ipynb
        - file: fts/ftsKeywords.md
        - file: fts/ftsMolecules.md
        - file: fts/ftsPotentials.md
    - file: utils.md
    - file: publications.md

site:
  options:
    logo: logo.png
    folders: true
  template: book-theme
